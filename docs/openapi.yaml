openapi: 3.0.3
info:
  title: Bloomory API
  version: "1.0.0"
  description: |
    OpenAPI-style documentation for the Bloomory backend.

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
      required: [success, message]

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      required: [ok]

    User:
      type: object
      properties:
        id:
          type: string
          description: User ID
          example: "663f1e3f4e1a2b0012345678"
        email:
          type: string
          nullable: true
          example: "user@example.com"
        phone:
          type: string
          nullable: true
          example: "+911234567890"
        name:
          type: string
          example: "Jane Doe"
        plan:
          type: string
          enum: [free, personal, partner, vendor]
          example: free
        avatarUrl:
          type: string
          nullable: true
        isEmailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
          example: "Logged in"
        token:
          type: string
          description: JWT access token
        isNew:
          type: boolean
          nullable: true
        user:
          $ref: '#/components/schemas/User'
      required: [success, token, user]

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 6
          maxLength: 20
        name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 6
          maxLength: 72
      required: [password]
      description: Provide either email or phone (or both).

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 6
          maxLength: 20
        password:
          type: string
          minLength: 6
          maxLength: 72
      required: [password]
      description: Provide either email or phone.

    LoginEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 72
      required: [email, password]

    SendOtpRequest:
      type: object
      properties:
        mobile:
          type: string
          minLength: 6
          maxLength: 20
      required: [mobile]

    SendOtpResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "OTP sent (demo). Integrate SMS provider for production."
        otp:
          type: string
          description: Only returned in non-production.
      required: [success, message]

    CheckCountryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        country:
          type: string
          nullable: true
          example: "IN"
        isIndia:
          type: boolean
          example: true
      required: [success, isIndia]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        avatarUrl:
          type: string
          format: uri
        plan:
          type: string
          enum: [free, personal, partner, vendor]

    Album:
      type: object
      properties:
        id:
          type: string
          example: "6640aa0b7e3cfa0012345678"
        userId:
          type: string
        memoryId:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true
        level:
          type: integer
          enum: [1, 2]
        title:
          type: string
        description:
          type: string
        coverMediaId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAlbumRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        memoryId:
          type: string
        parentId:
          type: string
          nullable: true
        coverMediaId:
          type: string
      required: [title]

    UpdateAlbumRequest:
      allOf:
        - $ref: '#/components/schemas/CreateAlbumRequest'
      description: All fields optional; parent/level cannot be changed.

    Memory:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
        coverMediaId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        isFavorite:
          type: boolean
        visibility:
          type: string
          enum: [private, shared, public]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMemoryRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 30
        visibility:
          type: string
          enum: [private, shared, public]
      required: [title]

    UpdateMemoryRequest:
      allOf:
        - $ref: '#/components/schemas/CreateMemoryRequest'
      properties:
        isFavorite:
          type: boolean
        coverMediaId:
          type: string

    Media:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        albumId:
          type: string
          nullable: true
        memoryId:
          type: string
          nullable: true
        type:
          type: string
          enum: [image, video]
        url:
          type: string
        key:
          type: string
        thumbUrl:
          type: string
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        sizeBytes:
          type: integer
          nullable: true
        mimeType:
          type: string
        durationSec:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateMediaRequest:
      type: object
      properties:
        type:
          type: string
          enum: [image, video]
        url:
          type: string
          format: uri
        key:
          type: string
        thumbUrl:
          type: string
          format: uri
        albumId:
          type: string
        memoryId:
          type: string
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        sizeBytes:
          type: integer
          minimum: 1
        mimeType:
          type: string
        durationSec:
          type: number
          minimum: 0
      required: [type, url]

    AiAskRequest:
      type: object
      properties:
        message:
          type: string
      required: [message]

    AiAskResponse:
      type: object
      properties:
        reply:
          type: string
      required: [reply]

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/auth/google:
    post:
      summary: Google sign-in (register if new)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken:
                  type: string
              required: [idToken]
      responses:
        '200':
          description: Login or registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login-google:
    post:
      summary: Google sign-in (legacy route)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idToken:
                  type: string
              required: [idToken]
      responses:
        '200':
          description: Login or registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/auth/register:
    post:
      summary: Register with email or phone + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Login with email or phone + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login-email:
    post:
      summary: Email + password login (Flutter compatibility)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginEmailRequest'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/auth/send-otp:
    post:
      summary: Send OTP to mobile (demo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: OTP sent (demo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendOtpResponse'

  /api/auth/check-country:
    get:
      summary: Detect country from headers
      responses:
        '200':
          description: Country detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckCountryResponse'

  /api/auth/me:
    get:
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/me:
    patch:
      summary: Update current user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/albums:
    post:
      summary: Create album
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlbumRequest'
      responses:
        '201':
          description: Album created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  album:
                    $ref: '#/components/schemas/Album'
    get:
      summary: List albums
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: memoryId
          schema:
            type: string
          required: false
        - in: query
          name: parentId
          schema:
            type: string
            nullable: true
          required: false
          description: |
            If omitted, returns root albums.
            If empty or "null", explicitly filters parentId = null.
      responses:
        '200':
          description: Albums list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  albums:
                    type: array
                    items:
                      $ref: '#/components/schemas/Album'

  /api/albums/{id}:
    get:
      summary: Get album details, children and media
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Album details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  album:
                    $ref: '#/components/schemas/Album'
                  children:
                    type: array
                    items:
                      $ref: '#/components/schemas/Album'
                  media:
                    type: array
                    items:
                      $ref: '#/components/schemas/Media'
        '404':
          description: Album not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update album
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlbumRequest'
      responses:
        '200':
          description: Updated album
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  album:
                    $ref: '#/components/schemas/Album'
        '404':
          description: Album not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete album
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Album deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Album has sub-albums
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Album not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/memories:
    post:
      summary: Create memory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemoryRequest'
      responses:
        '201':
          description: Memory created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  memory:
                    $ref: '#/components/schemas/Memory'
    get:
      summary: List memories
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Memories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  memories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Memory'

  /api/memories/{id}:
    get:
      summary: Get memory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  memory:
                    $ref: '#/components/schemas/Memory'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update memory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemoryRequest'
      responses:
        '200':
          description: Updated memory
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  memory:
                    $ref: '#/components/schemas/Memory'
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete memory
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Memory deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '404':
          description: Memory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/media:
    post:
      summary: Create media (record existing URL)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMediaRequest'
      responses:
        '201':
          description: Media created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  media:
                    $ref: '#/components/schemas/Media'
    get:
      summary: List media
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: albumId
          schema:
            type: string
        - in: query
          name: memoryId
          schema:
            type: string
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  media:
                    type: array
                    items:
                      $ref: '#/components/schemas/Media'

  /api/media/upload:
    post:
      summary: Upload media to Bunny via multipart/form-data
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                albumId:
                  type: string
                type:
                  type: string
                  enum: [image, video]
                  description: Optional; inferred from file mimetype if omitted.
                file:
                  type: string
                  format: binary
                thumbnail:
                  type: string
                  format: binary
              required: [albumId, file]
      responses:
        '201':
          description: Media uploaded and created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  media:
                    $ref: '#/components/schemas/Media'
        '400':
          description: Validation error (missing albumId/file/type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/media/{id}:
    delete:
      summary: Delete media
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/ask:
    post:
      summary: BloomoryAI assistant – product questions only
      description: |
        Rate-limited per IP. Blocks code/developer-help queries and returns
        a friendly explanation instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiAskRequest'
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAskResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAskResponse'